<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>HIGGS DOMINO | LLC PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #ffffff; min-height: 100vh; }
        .bg-master { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; overflow: hidden; }
        .nebula-1 { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #000); animation: pulse 8s ease-in-out infinite; }
        .nebula-2 { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at 80% 70%, #1a0a2a, transparent); animation: pulse2 10s ease-in-out infinite alternate; }
        @keyframes pulse { 0%,100%{opacity:0.6;}50%{opacity:1;} }
        @keyframes pulse2 { 0%{transform:scale(1);opacity:0.4;}100%{transform:scale(1.2);opacity:0.8;} }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .section-title { margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title h3 { font-size: 18px; color: #fbbf24; border-left: 4px solid #f59e0b; padding-left: 12px; }
        .price-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .price-card { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px 16px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(245,158,11,0.2); }
        .price-card:hover { transform: translateX(5px); background: rgba(245,158,11,0.1); }
        .price-jumlah { font-weight: 700; font-size: 13px; color: #fbbf24; }
        .price-harga-beli { font-weight: 700; font-size: 12px; color: #10b981; font-family: monospace; }
        .price-harga-bongkar { font-weight: 700; font-size: 12px; color: #ef4444; font-family: monospace; }
        
        /* MODAL YANG DIPERBAIKI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: linear-gradient(135deg, #1e293b, #0f172a); max-width: 450px; width: 90%; max-height: 85vh; border-radius: 2rem; border: 2px solid #f59e0b; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER: judul dan tombol X sejajar tengah */
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid #334155; background: #0f172a; flex-shrink: 0; }
        .modal-header h3 { color: #fbbf24; font-size: 18px; margin: 0; }
        .modal-close { font-size: 28px; cursor: pointer; color: #94a3b8; transition: 0.2s; line-height: 1; }
        .modal-close:hover { color: #f59e0b; transform: rotate(90deg); }
        
        /* BODY: area scroll untuk form dan preview */
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        /* FOOTER: tombol kirim STICKY DI BAWAH */
        .modal-footer { padding: 16px 20px; border-top: 1px solid #334155; background: #0f172a; flex-shrink: 0; }
        .btn-send { width: 100%; padding: 14px; border-radius: 40px; font-weight: 800; cursor: pointer; border: none; background: linear-gradient(95deg, #f59e0b, #fbbf24); color: #0f172a; font-size: 14px; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.02); filter: brightness(1.05); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 40px; color: white; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { border-color: #f59e0b; outline: none; }
        .harga-display { background: #0f172a; border-radius: 40px; padding: 12px; margin: 15px 0; text-align: center; border-left: 3px solid #10b981; font-weight: 600; }
        
        /* PREVIEW MESSAGE: bisa scroll, tombol tetap di bawah */
        .preview-msg { background: #0f172a; padding: 12px; border-radius: 16px; margin: 15px 0 5px 0; border-left: 4px solid #f59e0b; font-size: 11px; font-family: monospace; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
        
        .btn-chat { background: linear-gradient(95deg, #4f46e5, #7c3aed); color: white; margin-top: 20px; width: 100%; padding: 14px; border-radius: 40px; font-weight: 800; cursor: pointer; border: none; font-size: 14px; }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; z-index: 3000; transition: 0.3s; border-left: 4px solid #f59e0b; opacity: 0; font-size: 13px; }
        .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="bg-master"><div class="nebula-1"></div><div class="nebula-2"></div></div>
    
    <div class="container">
        <div class="section-title"><h3><i class="fas fa-shopping-cart" style="color:#10b981"></i> DAFTAR HARGA TOPUP</h3></div>
        <div class="price-grid" id="beliList"></div>
        
        <div class="section-title"><h3><i class="fas fa-exchange-alt" style="color:#ef4444"></i> DAFTAR HARGA BONGKAR</h3></div>
        <div class="price-grid" id="bongkarList"></div>
        
        <button class="btn-chat" onclick="openChat()"><i class="fas fa-headset"></i> Chat Admin</button>
        <div class="footer">© 2026 LLC PREMIUM</div>
    </div>
    
    <!-- MODAL -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-file-invoice"></i> Form Transaksi</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Game</label>
                    <input type="text" id="gameNameDisplay" value="HIGGS DOMINO" readonly style="background:#334155;">
                </div>
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <select id="transaksiType">
                        <option value="">-- Pilih --</option>
                        <option value="BELI">🔰 TOPUP (Beli Chip)</option>
                        <option value="BONGKAR">📤 BONGKAR (Jual Chip)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jumlah Chip</label>
                    <select id="jumlahSelect">
                        <option value="">-- Pilih Jenis dulu --</option>
                    </select>
                </div>
                <div class="harga-display" id="hargaDisplay">💰 Harga akan muncul setelah pilih jumlah</div>
                <div class="form-group">
                    <label>ID Game</label>
                    <input type="text" id="idGame" placeholder="Masukkan ID Game Anda">
                </div>
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select id="bankTransfer">
                        <option value="">Pilih Metode</option>
                        <option value="QRIS">QRIS</option>
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="BRI">BRI</option>
                        <option value="BNI">BNI</option>
                        <option value="BCA">BCA</option>
                        <option value="Mandiri">Mandiri</option>
                    </select>
                </div>
                <div class="preview-msg" id="previewBox">⚡ Isi data di atas</div>
            </div>
            <div class="modal-footer">
                <button class="btn-send" id="sendBtn"><i class="fas fa-paper-plane"></i> Kirim Pesanan</button>
            </div>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg">✅ Pesan dikirim!</div>
    
    <script>
        var HARGA_BELI = {
            "100M": 7000, "200M": 13000, "300M": 18000, "400M": 24000, "500M": 30000,
            "600M": 36000, "700M": 42000, "800M": 48000, "900M": 53000,
            "1B": 55000, "2B": 110000, "3B": 165000, "4B": 220000, "5B": 275000,
            "6B": 330000, "7B": 385000, "8B": 440000, "9B": 495000, "10B": 550000,
            "15B": 825000, "20B": 1100000, "25B": 1375000, "30B": 1650000,
            "35B": 1925000, "40B": 2200000, "45B": 2475000, "50B": 2750000
        };
        var HARGA_BONGKAR = {
            "1B": 52000, "2B": 104000, "3B": 156000, "4B": 208000, "5B": 260000,
            "6B": 312000, "7B": 364000, "8B": 416000, "9B": 468000, "10B": 520000,
            "15B": 780000, "20B": 1040000, "25B": 1300000, "30B": 1560000,
            "35B": 1820000, "40B": 2080000, "45B": 2340000, "50B": 2600000
        };
        var currentJenis = "", currentJumlah = "", currentHarga = 0;
        var isSending = false;
        
        function formatRupiah(angka) { return "Rp " + angka.toLocaleString('id-ID'); }
        
        function renderPrices() {
            var beliHtml = "";
            for (var jml in HARGA_BELI) {
                beliHtml += '<div class="price-card" onclick="openModal(\'BELI\', \'' + jml + '\', ' + HARGA_BELI[jml] + ')">' +
                    '<span class="price-jumlah">' + jml + '</span>' +
                    '<span class="price-harga-beli">' + formatRupiah(HARGA_BELI[jml]) + '</span>' +
                '</div>';
            }
            document.getElementById('beliList').innerHTML = beliHtml;
            
            var bongkarHtml = "";
            for (var jml in HARGA_BONGKAR) {
                bongkarHtml += '<div class="price-card" onclick="openModal(\'BONGKAR\', \'' + jml + '\', ' + HARGA_BONGKAR[jml] + ')">' +
                    '<span class="price-jumlah">' + jml + '</span>' +
                    '<span class="price-harga-bongkar">' + formatRupiah(HARGA_BONGKAR[jml]) + '</span>' +
                '</div>';
            }
            document.getElementById('bongkarList').innerHTML = bongkarHtml;
        }
        
        function openModal(jenis, jumlah, harga) {
            currentJenis = jenis; currentJumlah = jumlah; currentHarga = harga;
            document.getElementById("transaksiType").value = jenis;
            updateJumlahSelect();
            document.getElementById("jumlahSelect").value = jumlah;
            document.getElementById("hargaDisplay").innerHTML = '💰 Harga: <span style="color:#10b981">' + formatRupiah(harga) + '</span>';
            document.getElementById("idGame").value = "";
            document.getElementById("bankTransfer").value = "";
            updatePreview();
            document.getElementById("orderModal").style.display = "flex";
        }
        
        function updateJumlahSelect() {
            var select = document.getElementById("jumlahSelect");
            var jenis = document.getElementById("transaksiType").value;
            var data = jenis === "BELI" ? HARGA_BELI : HARGA_BONGKAR;
            select.innerHTML = '<option value="">-- Pilih Jumlah --</option>';
            for (var jml in data) {
                var option = document.createElement('option');
                option.value = jml;
                option.textContent = jml + ' - ' + formatRupiah(data[jml]);
                select.appendChild(option);
            }
        }
        
        function updateHarga() {
            var jenis = document.getElementById("transaksiType").value;
            var jumlah = document.getElementById("jumlahSelect").value;
            var data = jenis === "BELI" ? HARGA_BELI : HARGA_BONGKAR;
            if (jumlah && data[jumlah]) {
                currentJenis = jenis; currentJumlah = jumlah; currentHarga = data[jumlah];
                document.getElementById("hargaDisplay").innerHTML = '💰 Harga: <span style="color:#10b981">' + formatRupiah(currentHarga) + '</span>';
            } else {
                document.getElementById("hargaDisplay").innerHTML = "💰 Harga akan muncul setelah pilih jumlah";
            }
        }
        
        function generateMessage() {
            var jenis = document.getElementById("transaksiType").value;
            var jumlah = document.getElementById("jumlahSelect").value;
            var id = document.getElementById("idGame").value.trim();
            var bank = document.getElementById("bankTransfer").value;
            if (!jenis) return "⚠️ Pilih jenis transaksi";
            if (!jumlah) return "⚠️ Pilih jumlah";
            if (!id) return "⚠️ Masukkan ID Game";
            if (!bank) return "⚠️ Pilih metode pembayaran";
            var harga = jenis === "BELI" ? HARGA_BELI[jumlah] : HARGA_BONGKAR[jumlah];
            var judul = (jenis === "BELI") ? "ORDER HIGGS DOMINO" : "BONGKAR HIGGS DOMINO";
            return judul + "\n━━━━━━━━━━━━━━━━━━━━\n🎮 Game: HIGGS DOMINO\n📌 Jenis: " + jenis + "\n💰 Jumlah: " + jumlah + "\n💵 Harga: " + formatRupiah(harga) + "\n🆔 ID Game: " + id + "\n🏦 Metode Bayar: " + bank + "\n━━━━━━━━━━━━━━━━━━━━\n⏰ Mohon diproses, terima kasih.";
        }
        
        function updatePreview() {
            var msg = generateMessage();
            var box = document.getElementById("previewBox");
            if (msg.startsWith("⚠️")) { box.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + msg; }
            else { box.innerHTML = msg.replace(/\n/g, '<br>'); }
        }
        
        function sendMessage() {
            if (isSending) { showToast("⏳ Tunggu..."); return; }
            var msg = generateMessage();
            if (msg.startsWith("⚠️")) { showToast("❌ Lengkapi data!"); return; }
            isSending = true; showToast("✅ Pesanan dikirim ke Admin!"); closeModal();
            if (window.Android && window.Android.sendMessageToAdmin) { window.Android.sendMessageToAdmin(msg); }
            else { alert("Pesan:\n\n" + msg); }
            setTimeout(function() { isSending = false; }, 2000);
        }
        
        function openChat() { if (window.Android && window.Android.openChat) { window.Android.openChat(); } }
        function closeModal() { document.getElementById("orderModal").style.display = "none"; isSending = false; }
        function showToast(msg) { var t = document.getElementById('toastMsg'); t.innerHTML = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2000); }
        
        document.getElementById("transaksiType")?.addEventListener("change", function() { updateJumlahSelect(); updateHarga(); updatePreview(); });
        document.getElementById("jumlahSelect")?.addEventListener("change", function() { updateHarga(); updatePreview(); });
        document.getElementById("idGame")?.addEventListener("input", updatePreview);
        document.getElementById("bankTransfer")?.addEventListener("change", updatePreview);
        document.getElementById("sendBtn")?.addEventListener("click", sendMessage);
        
        renderPrices();
    </script>
</body>
</html>
