<!-- FILE: riwayat.html (LENGKAP - TRANSAKSI JUAL/BELI TAMPIL) -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Riwayat Transaksi - LLC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
        }
        .bg-system { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #000); animation: bgPulse 8s ease-in-out infinite; }
        @keyframes bgPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -5; }
        .particle { position: absolute; background: radial-gradient(circle, #fbbf24, transparent); border-radius: 50%; animation: floatParticle linear infinite; opacity: 0.4; }
        @keyframes floatParticle { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 2; }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; justify-content: space-between; background: rgba(15,25,45,0.5); backdrop-filter: blur(15px); padding: 15px 25px; border-radius: 2rem; border: 1px solid rgba(245,158,11,0.3); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: rgba(255,255,255,0.08); border: none; width: 48px; height: 48px; border-radius: 50%; color: #fbbf24; cursor: pointer; font-size: 1.3rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; outline: none; }
        .back-btn:hover { background: #f59e0b; color: black; transform: scale(1.1) rotate(-10deg); }
        .back-btn:active { transform: scale(0.95); }
        .title { font-size: 1.8rem; background: linear-gradient(135deg, #fbbf24, #f59e0b, #ea580c); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: titleShine 3s ease infinite; }
        @keyframes titleShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .info-penting { background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.05)); border-left: 4px solid #f59e0b; border-radius: 1rem; padding: 18px 22px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .info-penting i { font-size: 28px; color: #f59e0b; }
        .stats-ringkasan { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 30px; }
        .stat-card { background: rgba(15,25,45,0.7); backdrop-filter: blur(12px); border-radius: 1.2rem; padding: 22px; text-align: center; border: 1px solid rgba(245,158,11,0.25); transition: all 0.3s; position: relative; overflow: hidden; cursor: pointer; }
        .stat-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(245,158,11,0.05), transparent); animation: statShine 8s linear infinite; }
        @keyframes statShine { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .stat-card:hover { transform: translateY(-6px); border-color: #f59e0b; }
        .stat-card i { font-size: 34px; color: #f59e0b; margin-bottom: 12px; display: block; }
        .stat-card .value { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, white, #fbbf24); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 6px; }
        .filter-buttons { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-btn { background: #1e293b; border: none; padding: 10px 28px; border-radius: 50px; color: #94a3b8; cursor: pointer; transition: all 0.3s; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; outline: none; }
        .filter-btn.active, .filter-btn:hover { background: linear-gradient(135deg, #f59e0b, #ea580c); color: black; transform: translateY(-3px); }
        .riwayat-table { background: rgba(10,20,35,0.5); backdrop-filter: blur(15px); border-radius: 1.5rem; overflow-x: auto; border: 1px solid rgba(245,158,11,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 18px 15px; color: #fbbf24; border-bottom: 2px solid #f59e0b; font-weight: 700; font-size: 13px; }
        td { padding: 14px 15px; border-bottom: 1px solid rgba(51,65,85,0.5); font-size: 13px; transition: 0.2s; }
        tr:hover td { background: rgba(245,158,11,0.06); }
        .empty-riwayat { text-align: center; padding: 70px 20px; color: #94a3b8; }
        .empty-riwayat i { font-size: 60px; margin-bottom: 20px; opacity: 0.4; }
        .badge-status { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .badge-selesai { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .badge-terkirim { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .badge-batal { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .footer-info { margin-top: 25px; padding: 15px 20px; background: rgba(15,25,45,0.4); backdrop-filter: blur(10px); border-radius: 1rem; text-align: center; }
        @media (max-width: 768px) { th, td { padding: 10px 12px; font-size: 11px; } .title { font-size: 1.3rem; } .filter-btn { padding: 6px 16px; font-size: 11px; } }
    </style>
</head>
<body>
<div class="bg-system"></div>
<div class="particles" id="particles"></div>
<div class="container">
    <div class="header">
        <div class="header-left"><button class="back-btn" onclick="window.location.href='../index.html'"><i class="fas fa-arrow-left"></i></button><h1 class="title"><i class="fas fa-history"></i> Riwayat Transaksi</h1></div>
    </div>
    <div class="info-penting"><i class="fas fa-info-circle"></i><p><strong>Informasi Penting:</strong> Riwayat ini mencatat semua transaksi <strong>BELI</strong> dan <strong>JUAL</strong> Anda. Status <strong>"Pesan Terkirim"</strong> berarti pesanan sudah masuk ke admin.</p></div>
    <div class="stats-ringkasan" id="statsRingkasan"></div>
    <div class="filter-buttons"><button class="filter-btn active" data-filter="all"><i class="fas fa-list"></i> Semua</button><button class="filter-btn" data-filter="BELI"><i class="fas fa-arrow-down"></i> Beli</button><button class="filter-btn" data-filter="JUAL"><i class="fas fa-arrow-up"></i> Jual</button></div>
    <div class="riwayat-table">
        <table>
            <thead><tr><th>Tanggal</th><th>Game</th><th>Jenis</th><th>Jumlah</th><th>ID Game</th><th>Status</th></tr></thead>
            <tbody id="riwayatBody"></tbody>
        </table>
    </div>
    <div class="footer-info"><i class="fas fa-comment-dots"></i> <span>Butuh bantuan? Chat admin langsung melalui Chat APK di halaman utama</span></div>
</div>
<script>
    for(let i=0;i<120;i++){let p=document.createElement('div');p.classList.add('particle');let s=Math.random()*4+1;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.animationDuration=Math.random()*(15-6)+6+'s';p.style.animationDelay=Math.random()*15+'s';document.getElementById('particles').appendChild(p);}
    let riwayatData = [], currentFilter = "all";
    function loadRiwayat(){ const st=localStorage.getItem('llc_riwayat'); riwayatData=st?JSON.parse(st):[]; renderStats(); renderRiwayat(); }
    function renderStats(){ const t=riwayatData.length, b=riwayatData.filter(r=>r.jenis==='BELI').length, j=riwayatData.filter(r=>r.jenis==='JUAL').length; let total=0; riwayatData.forEach(r=>{ let angka=parseInt((r.jumlah||"").replace(/[^0-9]/g,'')); if(!isNaN(angka)) total+=angka; }); document.getElementById('statsRingkasan').innerHTML=`<div class="stat-card"><i class="fas fa-receipt"></i><div class="value">${t}</div><div class="label">Total Transaksi</div></div><div class="stat-card"><i class="fas fa-arrow-down"></i><div class="value">${b}</div><div class="label">Pembelian (Beli)</div></div><div class="stat-card"><i class="fas fa-arrow-up"></i><div class="value">${j}</div><div class="label">Penjualan (Jual)</div></div><div class="stat-card"><i class="fas fa-coins"></i><div class="value">Rp ${total.toLocaleString()}</div><div class="label">Total Nominal</div></div>`; }
    function getStatusBadge(status){ if(status==='selesai') return '<span class="badge-status badge-selesai"><i class="fas fa-check-circle"></i> Selesai</span>'; if(status==='batal') return '<span class="badge-status badge-batal"><i class="fas fa-times-circle"></i> Batal</span>'; return '<span class="badge-status badge-terkirim"><i class="fas fa-paper-plane"></i> Pesan Terkirim</span>'; }
    function formatTanggal(t){ try{ let d=new Date(t); if(isNaN(d.getTime())) return t; return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return t; } }
    function renderRiwayat(){ let filtered=[...riwayatData]; if(currentFilter!=="all") filtered=filtered.filter(r=>r.jenis===currentFilter); filtered.sort((a,b)=>(b.tanggal?new Date(b.tanggal):0)-(a.tanggal?new Date(a.tanggal):0)); const tbody=document.getElementById('riwayatBody'); if(filtered.length===0){ tbody.innerHTML=`<tr><td colspan="6" class="empty-riwayat"><i class="fas fa-inbox"></i><p>Belum ada riwayat transaksi</p><p style="font-size:12px; margin-top:8px;">Silakan lakukan transaksi melalui halaman utama</p></td></tr>`; return; }
        tbody.innerHTML=filtered.map(r=>`<tr><td style="font-size:11px;color:#94a3b8;">${formatTanggal(r.tanggal)}</td><td><strong style="color:#fbbf24;">${r.game}</strong></td><td>${r.jenis==='BELI'?'<span style="color:#22c55e;"><i class="fas fa-arrow-down"></i> Beli</span>':'<span style="color:#f97316;"><i class="fas fa-arrow-up"></i> Jual</span>'}</td><td style="font-family:monospace;">${r.jumlah}</td><td style="font-size:12px;">${r.idGame}</td><td>${getStatusBadge(r.status)}</td></tr>`).join(''); }
    document.querySelectorAll('.filter-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentFilter=btn.dataset.filter; renderRiwayat(); }; });
    loadRiwayat();
</script>
</body>
</html>
