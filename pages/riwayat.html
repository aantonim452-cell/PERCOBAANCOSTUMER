<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Riwayat Transaksi</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></head>
<body style="background:#0a0a1a; padding:20px">
<div style="max-width:600px; margin:auto">
    <button class="back-btn" onclick="location.href='../index.html'">← Kembali</button>
    <h2 style="color:#fbbf24"><i class="fas fa-history"></i> Riwayat Order MOD</h2>
    <div id="riwayatList"></div>
    <button class="clear-btn" onclick="localStorage.removeItem('llc_riwayat'); location.reload()">Hapus Semua</button>
</div>
<script>
    const r = JSON.parse(localStorage.getItem('llc_riwayat') || '[]');
    const container = document.getElementById('riwayatList');
    if(r.length===0) container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    else container.innerHTML = r.map(t => `
        <div class="riwayat-card">
            <div class="riwayat-date">${t.tanggal}</div>
            <div class="riwayat-game">🎮 ${t.game}</div>
            <div class="riwayat-detail">📦 ${t.paket} | 💰 ${t.harga} | 💳 ${t.metode}</div>
            <div class="riwayat-detail">Status: <span class="status-proses">${t.status}</span></div>
        </div>
    `).join('');
</script>
<style>.back-btn,.clear-btn{background:#f59e0b;border:none;padding:10px;border-radius:40px;width:100%;margin:10px 0;color:#0f172a;font-weight:bold}.riwayat-card{background:#0f172a;border-radius:16px;padding:15px;margin-bottom:12px}.empty-state{text-align:center;padding:40px;color:#64748b}</style>
</body>
</html>
