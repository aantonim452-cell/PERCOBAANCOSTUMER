<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LLC STORE | MOD GAME PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
        .bg-master { position: fixed; inset: 0; z-index: -10; overflow: hidden; }
        .nebula-1, .nebula-2, .nebula-3 { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: float 20s infinite; }
        .nebula-1 { width: 500px; height: 500px; background: #8b5cf6; top: -200px; left: -200px; }
        .nebula-2 { width: 600px; height: 600px; background: #3b82f6; bottom: -200px; right: -200px; animation-delay: -5s; }
        .nebula-3 { width: 400px; height: 400px; background: #f59e0b; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -10s; }
        @keyframes float { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
        .loading-screen { position: fixed; inset: 0; background: #0a0a1a; z-index: 10000; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s; }
        .loader-ring { width: 60px; height: 60px; border: 3px solid rgba(245,158,11,0.2); border-top: 3px solid #f59e0b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; padding: 12px 24px; border-radius: 50px; z-index: 1000; transition: 0.3s; border-left: 4px solid #f59e0b; opacity: 0; font-size: 13px; }
        .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }
        .hero { background: rgba(15,25,45,0.65); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 1rem; text-align: center; margin-bottom: 20px; border: 1px solid rgba(245,158,11,0.3); }
        .badge { background: rgba(51,65,85,0.5); padding: 6px 14px; border-radius: 50px; font-size: 12px; display: inline-block; margin: 4px; border-left: 3px solid #f59e0b; }
        .price-section, .payment-section { background: rgba(15,25,45,0.6); border-radius: 1.5rem; padding: 16px; margin: 20px 0; border: 1px solid rgba(245,158,11,0.3); }
        .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
        .price-card { background: #1e293b; border-radius: 1rem; padding: 12px; text-align: center; }
        .price-duration { font-size: 14px; font-weight: 600; color: #fbbf24; }
        .price-value { font-size: 16px; font-weight: 800; margin-top: 5px; }
        .payment-methods { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .payment-chip { background: #0f172a; padding: 6px 12px; border-radius: 50px; font-size: 12px; border: 1px solid rgba(245,158,11,0.3); }
        .game-grid { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .game-card { background: rgba(10,20,35,0.6); backdrop-filter: blur(12px); border-radius: 1.2rem; border: 1px solid rgba(245,158,11,0.25); overflow: hidden; transition: 0.2s; }
        .game-card:active { transform: scale(0.98); }
        .game-header { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(30,41,59,0.9); border-bottom: 1px solid #f59e0b; }
        .game-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 2px solid #f59e0b; }
        .game-name { font-weight: 700; background: linear-gradient(45deg, #ffd966, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-order { width: 100%; padding: 12px; background: linear-gradient(95deg, #f59e0b, #d97706); border: none; color: white; font-weight: 700; border-radius: 50px; cursor: pointer; transition: 0.1s; }
        .btn-order:active { transform: scale(0.96); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: linear-gradient(135deg, #1e293b, #0f172a); width: 90%; max-width: 450px; border-radius: 1.5rem; padding: 20px; border: 2px solid #f59e0b; }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 40px; color: white; }
        .preview { background: #0f172a; padding: 10px; border-radius: 12px; font-size: 11px; border-left: 3px solid #f59e0b; margin: 15px 0; white-space: pre-wrap; font-family: monospace; }
        .btn-copy, .btn-send { width: 100%; padding: 12px; border-radius: 40px; font-weight: 700; margin: 8px 0; border: none; cursor: pointer; transition: 0.1s; }
        .btn-copy { background: #334155; color: white; }
        .btn-send { background: linear-gradient(95deg, #f59e0b, #fbbf24); color: #0f172a; }
        .btn-copy:active, .btn-send:active { transform: scale(0.96); }
        .telegram-btn { display: inline-block; margin-top: 20px; background: #0088cc; padding: 10px 20px; border-radius: 50px; color: white; text-decoration: none; text-align: center; }
        .footer { text-align: center; padding: 20px 0; font-size: 11px; color: #64748b; border-top: 1px solid rgba(245,158,11,0.2); margin-top: 20px; }
    </style>
</head>
<body>

<div id="loadingScreen" class="loading-screen"><div class="loader-ring"></div><p>LLC STORE</p></div>
<div id="toastMsg" class="toast-msg">✅ Pesan disalin!</div>

<div class="bg-master"><div class="nebula-1"></div><div class="nebula-2"></div><div class="nebula-3"></div></div>

<div class="container">
    <div class="hero">
        <div class="badge-collection">
            <span class="badge"><i class="fas fa-gem"></i> Mod Premium</span>
            <span class="badge"><i class="fas fa-shield-alt"></i> Anti Ban</span>
            <span class="badge"><i class="fas fa-clock"></i> 24/7</span>
            <span class="badge"><i class="fas fa-sync-alt"></i> Auto Update</span>
        </div>
    </div>

    <!-- Harga Paket -->
    <div class="price-section">
        <h3 style="color:#fbbf24; margin-bottom:10px;">💎 Harga MOD (Semua Game)</h3>
        <div class="price-grid" id="priceGrid"></div>
    </div>

    <!-- Metode Bayar -->
    <div class="payment-section">
        <h3 style="color:#fbbf24; margin-bottom:10px;"><i class="fas fa-credit-card"></i> Metode Pembayaran</h3>
        <div class="payment-methods" id="paymentMethods"></div>
    </div>

    <!-- Daftar Game -->
    <h3 style="color:#fbbf24; margin: 20px 0 10px;"><i class="fas fa-gamepad"></i> Pilih Game</h3>
    <div class="game-grid" id="gameList"></div>

    <!-- Tombol Grup Telegram -->
    <a href="https://t.me/llc_store" target="_blank" class="telegram-btn" style="display:block; text-align:center;">
        <i class="fab fa-telegram"></i> Grup Telegram
    </a>

    <div class="footer">© 2026 LLC STORE | MOD PREMIUM</div>
</div>

<!-- Modal Order (tanpa ID game & jumlah koin) -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3><i class="fas fa-cart-shopping"></i> Form Order MOD</h3>
            <span onclick="closeModal()" style="font-size:26px; cursor:pointer;">&times;</span>
        </div>
        <div class="form-group">
            <label>Game</label>
            <input type="text" id="modalGame" readonly style="background:#334155;">
        </div>
        <div class="form-group">
            <label>Paket Masa Aktif</label>
            <select id="modalPaket"></select>
        </div>
        <div class="form-group">
            <label>Metode Pembayaran</label>
            <select id="modalPaymentMethod"></select>
        </div>
        <div class="preview" id="modalPreview">⚡ Pilih game dan paket</div>
        <button class="btn-copy" id="copyOrderBtn"><i class="fas fa-copy"></i> Salin Pesanan</button>
        <button class="btn-send" id="sendOrderBtn"><i class="fas fa-paper-plane"></i> Kirim ke Chat APK</button>
        <div style="font-size:10px; text-align:center; margin-top:10px;">Pesanan akan disalin, buka chat APK dan paste</div>
    </div>
</div>

<script>
    // ========== DATA ==========
    const games = [
        { name: "PUBG Mobile", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZ1L1oeq0O83iQLxZPgGa0667Ppae27slZsdj_orTTxQ&s=10", desc: "ESP, Aimbot, No Recoil" },
        { name: "Free Fire", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRIanj8jNJDFOzMixdsXW9ES6L3k2h-hvvAHu1eIFtuw&s", desc: "Diamond Hack, Wallhack" },
        { name: "Mobile Legends", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjGrXZQoyfip2gmYpnC8pMPGdQ4JkBiRd9EBbQ3saBuQ&s=10", desc: "Map Hack, Skin Unlocker" },
        { name: "Call of Duty Mobile", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTESeKStEAEoqjIE_JGXqk5I-X1xytLcjK1DxG4Hdu91A&s=10", desc: "Radar, Aim Assist" },
        { name: "Genshin Impact", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRguULEwY0seVomZv6CStI9KcP9rs1xxOdblgHSWFHn5g&s=10", desc: "God Mode, Damage Multi" },
        { name: "Valorant", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRlTuataF1tUc9MNpLuz82cipmVwJnAKXLQpdRm6CScC4O1jPgxNX6zm2nv&s=10", desc: "TriggerBot, ESP" },
        { name: "Farlight 84", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPqUbbk0QisICb8Arx6bPeIG9WuZfKfyIEYyfXy0BK7A&s=10", desc: "Aimbot, Fly Hack" }
    ];

    const pricePlans = [
        { label: "14 Hari", price: 50000, priceText: "Rp 50.000" },
        { label: "30 Hari", price: 70000, priceText: "Rp 70.000" },
        { label: "60 Hari", price: 100000, priceText: "Rp 100.000" }
    ];

    const paymentMethods = ["QRIS", "DANA", "OVO", "BRI", "BCA", "Mandiri", "CIMB Niaga"];

    // ========== RENDER UI ==========
    function renderPriceGrid() {
        const container = document.getElementById("priceGrid");
        if (!container) return;
        container.innerHTML = pricePlans.map(p => `
            <div class="price-card">
                <div class="price-duration">📅 ${p.label}</div>
                <div class="price-value">${p.priceText}</div>
            </div>
        `).join('');
    }

    function renderPaymentMethods() {
        const container = document.getElementById("paymentMethods");
        if (!container) return;
        container.innerHTML = paymentMethods.map(m => `
            <div class="payment-chip"><i class="fas fa-check-circle"></i> ${m}</div>
        `).join('');
    }

    function renderGameList() {
        const container = document.getElementById("gameList");
        if (!container) return;
        container.innerHTML = games.map(game => `
            <div class="game-card">
                <div class="game-header">
                    <img class="game-img" src="${game.img}" onerror="this.src='https://via.placeholder.com/50'">
                    <div>
                        <div class="game-name">${game.name}</div>
                        <div style="font-size:10px; color:#94a3b8;">${game.desc}</div>
                    </div>
                </div>
                <div style="padding:12px;">
                    <button class="btn-order" onclick="openOrderModal('${game.name}')">
                        <i class="fas fa-cart-shopping"></i> Beli Mod
                    </button>
                </div>
            </div>
        `).join('');
    }

    // ========== MODAL ORDER (tanpa ID game & jumlah koin) ==========
    let currentOrder = { game: "", paket: "", metode: "", paketObj: null };

    function openOrderModal(gameName) {
        currentOrder.game = gameName;
        document.getElementById("modalGame").value = gameName;
        // Isi dropdown paket
        const paketSelect = document.getElementById("modalPaket");
        paketSelect.innerHTML = '<option value="">-- Pilih Paket --</option>' + 
            pricePlans.map(p => `<option value='${JSON.stringify(p)}'>${p.label} - ${p.priceText}</option>`).join('');
        // Isi dropdown metode
        const metodeSelect = document.getElementById("modalPaymentMethod");
        metodeSelect.innerHTML = '<option value="">-- Pilih Metode --</option>' + 
            paymentMethods.map(m => `<option value="${m}">${m}</option>`).join('');
        
        document.getElementById("orderModal").style.display = "flex";
        updatePreview();
    }

    function closeModal() {
        document.getElementById("orderModal").style.display = "none";
    }

    function updatePreview() {
        const game = document.getElementById("modalGame").value;
        const paketVal = document.getElementById("modalPaket").value;
        const metode = document.getElementById("modalPaymentMethod").value;
        let paketText = "", paketObj = null;
        if (paketVal) {
            paketObj = JSON.parse(paketVal);
            paketText = `${paketObj.label} - ${paketObj.priceText}`;
        }
        currentOrder.paket = paketText;
        currentOrder.paketObj = paketObj;
        currentOrder.metode = metode;
        
        const preview = `📋 ORDER MOD LLC STORE\n━━━━━━━━━━━━━━━━━━━━\n🎮 Game: ${game}\n📦 Paket: ${paketText || "Belum pilih"}\n💳 Metode: ${metode || "Belum pilih"}\n💰 Total: ${paketObj ? paketObj.priceText : "-"}\n━━━━━━━━━━━━━━━━━━━━\n⏰ Mohon diproses, terima kasih.`;
        document.getElementById("modalPreview").innerHTML = preview.replace(/\n/g, '<br>');
    }

    // ========== FUNGSI COPY & SEND (sama persis dengan mekanisme dari kode Anda) ==========
    function showToast(msg) {
        let t = document.getElementById('toastMsg');
        t.innerHTML = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function getCurrentMessage() {
        const game = document.getElementById("modalGame").value;
        const paketVal = document.getElementById("modalPaket").value;
        const metode = document.getElementById("modalPaymentMethod").value;
        if (!paketVal) return "⚠️ Pilih paket terlebih dahulu!";
        if (!metode) return "⚠️ Pilih metode pembayaran!";
        const paketObj = JSON.parse(paketVal);
        return `🛒 ORDER MOD LLC STORE 🛒\n━━━━━━━━━━━━━━━━━━━━\n🎮 Game: ${game}\n📦 Paket: ${paketObj.label} - ${paketObj.priceText}\n💳 Metode Bayar: ${metode}\n💰 Total: ${paketObj.priceText}\n━━━━━━━━━━━━━━━━━━━━\n⏰ Mohon diproses, terima kasih.`;
    }

    function copyMessage() {
        let msg = getCurrentMessage();
        if (msg.startsWith("⚠️")) {
            showToast(msg);
            return;
        }
        navigator.clipboard.writeText(msg);
        showToast("✅ Pesanan disalin! Buka Chat APK dan paste.");
    }

    function sendMessage() {
        let msg = getCurrentMessage();
        if (msg.startsWith("⚠️")) {
            showToast(msg);
            return;
        }
        // Simpan ke localStorage riwayat (opsional)
        let riwayat = JSON.parse(localStorage.getItem('llc_riwayat_mod') || '[]');
        riwayat.unshift({
            tanggal: new Date().toLocaleString('id-ID'),
            game: document.getElementById("modalGame").value,
            paket: document.getElementById("modalPaket").options[document.getElementById("modalPaket").selectedIndex]?.text || "",
            metode: document.getElementById("modalPaymentMethod").value,
            status: 'Diproses'
        });
        if (riwayat.length > 50) riwayat.pop();
        localStorage.setItem('llc_riwayat_mod', JSON.stringify(riwayat));

        // ===== INI MEKANISME CHAT APK (sama persis dengan kode asli Anda) =====
        if (window.Android && window.Android.sendMessageToAdmin) {
            // Jika ada bridge Android (APK dengan WebView)
            window.Android.sendMessageToAdmin(msg);
            showToast("✅ Pesanan dikirim ke Admin!");
            closeModal();
        } else {
            // Fallback: buka deep link ke chat APK (custom scheme)
            window.location.href = `llcstore://customer_chat?message=${encodeURIComponent(msg)}`;
            showToast("✅ Membuka Chat APK...");
            closeModal();
        }
    }

    // Event listener untuk dropdown
    document.getElementById("modalPaket")?.addEventListener("change", updatePreview);
    document.getElementById("modalPaymentMethod")?.addEventListener("change", updatePreview);
    document.getElementById("copyOrderBtn")?.addEventListener("click", copyMessage);
    document.getElementById("sendOrderBtn")?.addEventListener("click", sendMessage);

    // Tutup modal klik di luar
    window.onclick = e => { if (e.target === document.getElementById("orderModal")) closeModal(); };

    // Hilangkan loading screen
    setTimeout(() => {
        const loader = document.getElementById("loadingScreen");
        if (loader) {
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 500);
        }
    }, 1000);

    // Render semua
    renderPriceGrid();
    renderPaymentMethods();
    renderGameList();
</script>
</body>
</html>
