<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Riwayat Transaksi - LLC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
        }
        .bg-system { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #000); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .back-btn { background: rgba(255,255,255,0.1); border: none; width: 45px; height: 45px; border-radius: 50%; color: #fbbf24; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .back-btn:hover { background: #f59e0b; color: black; transform: scale(1.05); }
        .title { font-size: 1.8rem; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        /* Info Penting */
        .info-penting { background: rgba(245,158,11,0.15); border-left: 4px solid #f59e0b; border-radius: 1rem; padding: 15px 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .info-penting i { font-size: 24px; color: #f59e0b; }
        .info-penting p { font-size: 13px; color: #cbd5e1; flex: 1; }
        .info-penting strong { color: #fbbf24; }
        
        /* Stats Ringkasan */
        .stats-ringkasan { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(15,25,45,0.7); backdrop-filter: blur(10px); border-radius: 1rem; padding: 20px; text-align: center; border: 1px solid rgba(245,158,11,0.3); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-3px); border-color: #f59e0b; }
        .stat-card i { font-size: 30px; color: #f59e0b; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #fbbf24; }
        .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        
        /* Tombol filter */
        .filter-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: #1e293b; border: none; padding: 10px 24px; border-radius: 30px; color: #94a3b8; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .filter-btn.active, .filter-btn:hover { background: #f59e0b; color: black; }
        
        /* Tabel Riwayat */
        .riwayat-table { background: rgba(10,20,35,0.5); backdrop-filter: blur(10px); border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(245,158,11,0.2); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #fbbf24; border-bottom: 2px solid #f59e0b; font-weight: 600; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(51,65,85,0.5); }
        .empty-riwayat { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-riwayat i { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }
        .empty-riwayat p { font-size: 14px; }
        
        /* Status Badge */
        .badge-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-selesai { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid #22c55e; }
        .badge-proses { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid #f59e0b; }
        .badge-batal { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid #ef4444; }
        
        /* Tombol aksi */
        .btn-aksi-group { display: flex; gap: 8px; }
        .btn-hapus-satu { background: rgba(239,68,68,0.15); border: none; padding: 6px 12px; border-radius: 20px; color: #ef4444; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-hapus-satu:hover { background: #ef4444; color: white; }
        
        /* Tombol hapus semua */
        .btn-actions-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 15px; }
        .btn-hapus-semua { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; padding: 10px 24px; border-radius: 30px; color: #ef4444; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-hapus-semua:hover { background: #ef4444; color: white; }
        .info-catatan { font-size: 11px; color: #64748b; }
        
        @media (max-width: 768px) {
            th, td { padding: 8px 10px; font-size: 11px; }
            .title { font-size: 1.3rem; }
            .filter-btn { padding: 6px 16px; font-size: 12px; }
            .btn-aksi-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="bg-system"></div>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='../index.html'"><i class="fas fa-arrow-left"></i></button>
        <h1 class="title"><i class="fas fa-history"></i> Riwayat Transaksi</h1>
    </div>
    
    <div class="info-penting">
        <i class="fas fa-info-circle"></i>
        <p><strong>Informasi Penting:</strong> Riwayat ini hanya sebagai catatan pesanan Anda. Status transaksi akan dikonfirmasi oleh admin melalui <strong>Chat APK</strong>. Pastikan Anda selalu mengecek chat untuk konfirmasi lebih lanjut.</p>
    </div>
    
    <div class="stats-ringkasan" id="statsRingkasan"></div>
    
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">📋 Semua</button>
        <button class="filter-btn" data-filter="BELI">🔰 Beli</button>
        <button class="filter-btn" data-filter="JUAL">💰 Jual</button>
        <button class="filter-btn" data-filter="selesai">✅ Selesai</button>
        <button class="filter-btn" data-filter="proses">⏳ Proses</button>
    </div>
    
    <div class="riwayat-table">
        <table id="riwayatTable">
            <thead>
                <tr><th>Tanggal</th><th>Game</th><th>Jenis</th><th>Jumlah</th><th>ID Game</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="riwayatBody"></tbody>
        </table>
    </div>
    
    <div class="btn-actions-bottom">
        <button class="btn-hapus-semua" id="hapusSemuaBtn"><i class="fas fa-trash-alt"></i> Hapus Semua Riwayat</button>
        <span class="info-catatan"><i class="fas fa-phone-alt"></i> Butuh bantuan? Chat admin via APK</span>
    </div>
</div>

<script>
    let riwayatData = [];
    let currentFilter = "all";
    
    function loadRiwayat() {
        const stored = localStorage.getItem('llc_riwayat');
        if (stored) riwayatData = JSON.parse(stored);
        else riwayatData = [];
        renderStats();
        renderRiwayat();
    }
    
    function saveRiwayat() {
        localStorage.setItem('llc_riwayat', JSON.stringify(riwayatData));
        renderStats();
        renderRiwayat();
    }
    
    function formatRupiah(angka) {
        if (!angka) return "0";
        let str = angka.toString().replace(/[^0-9]/g, '');
        if (str === "") return "0";
        let nominal = parseInt(str);
        if (isNaN(nominal)) return "0";
        return nominal.toLocaleString('id-ID');
    }
    
    function hitungTotalNominal() {
        let total = 0;
        riwayatData.forEach(r => {
            let jumlahStr = r.jumlah || "";
            let angka = parseInt(jumlahStr.replace(/[^0-9]/g, ''));
            if (!isNaN(angka)) total += angka;
        });
        return total;
    }
    
    function renderStats() {
        const totalTrans = riwayatData.length;
        const totalBeli = riwayatData.filter(r => r.jenis === 'BELI').length;
        const totalJual = riwayatData.filter(r => r.jenis === 'JUAL').length;
        const totalNominal = hitungTotalNominal();
        
        document.getElementById('statsRingkasan').innerHTML = `
            <div class="stat-card"><i class="fas fa-receipt"></i><div class="value">${totalTrans}</div><div class="label">Total Transaksi</div></div>
            <div class="stat-card"><i class="fas fa-arrow-down"></i><div class="value">${totalBeli}</div><div class="label">Pembelian (Beli)</div></div>
            <div class="stat-card"><i class="fas fa-arrow-up"></i><div class="value">${totalJual}</div><div class="label">Penjualan (Jual)</div></div>
            <div class="stat-card"><i class="fas fa-coins"></i><div class="value">Rp ${totalNominal.toLocaleString()}</div><div class="label">Total Nominal</div></div>
        `;
    }
    
    function getBadgeStatus(status) {
        if (status === 'selesai') return '<span class="badge-status badge-selesai"><i class="fas fa-check-circle"></i> Selesai</span>';
        if (status === 'proses') return '<span class="badge-status badge-proses"><i class="fas fa-clock"></i> Proses</span>';
        if (status === 'batal') return '<span class="badge-status badge-batal"><i class="fas fa-times-circle"></i> Batal</span>';
        return '<span class="badge-status badge-proses">Proses</span>';
    }
    
    function renderRiwayat() {
        const tbody = document.getElementById('riwayatBody');
        let filtered = [...riwayatData];
        
        if (currentFilter !== "all") {
            if (currentFilter === "BELI" || currentFilter === "JUAL") {
                filtered = filtered.filter(r => r.jenis === currentFilter);
            } else {
                filtered = filtered.filter(r => r.status === currentFilter);
            }
        }
        
        // Urutkan dari yang terbaru (tanggal terbaru di atas)
        filtered.sort((a, b) => {
            if (a.tanggal && b.tanggal) {
                return new Date(b.tanggal) - new Date(a.tanggal);
            }
            return 0;
        });
        
        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-riwayat"><i class="fas fa-inbox"></i><p>Belum ada riwayat transaksi</p><p style="font-size:12px; margin-top:8px;">Silakan lakukan transaksi melalui halaman utama</p></td></tr>`;
            return;
        }
        
        tbody.innerHTML = filtered.map((r, idx) => {
            // Cari index asli di riwayatData
            const originalIndex = riwayatData.findIndex(item => 
                item.tanggal === r.tanggal && 
                item.game === r.game && 
                item.idGame === r.idGame &&
                item.jumlah === r.jumlah
            );
            return `
            <tr>
                <td>${r.tanggal || '-'}</td>
                <td><strong>${r.game}</strong></td>
                <td>${r.jenis === 'BELI' ? '🔰 Beli' : '💰 Jual'}</td>
                <td>${r.jumlah}</td>
                <td>${r.idGame}</td>
                <td>${getBadgeStatus(r.status)}</td>
                <td><button class="btn-hapus-satu" onclick="hapusSatuRiwayat(${originalIndex})"><i class="fas fa-trash-alt"></i> Hapus</button></td>
            </tr>
            `;
        }).join('');
    }
    
    function hapusSatuRiwayat(index) {
        if (index >= 0 && index < riwayatData.length) {
            if (confirm('Hapus riwayat transaksi ini?')) {
                riwayatData.splice(index, 1);
                saveRiwayat();
            }
        }
    }
    
    // Hapus semua riwayat
    document.getElementById('hapusSemuaBtn').onclick = () => {
        if (riwayatData.length === 0) {
            alert('Belum ada riwayat untuk dihapus.');
            return;
        }
        if (confirm('⚠️ PERINGATAN: Anda akan menghapus SEMUA riwayat transaksi! Tindakan ini tidak dapat dibatalkan. Lanjutkan?')) {
            riwayatData = [];
            saveRiwayat();
        }
    };
    
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderRiwayat();
        };
    });
    
    loadRiwayat();
</script>
</body>
</html>
