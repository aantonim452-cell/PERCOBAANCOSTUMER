<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><title>Riwayat Transaksi</title><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></head>
<body style="background:#0a0a1a;padding:20px">
<div style="max-width:600px;margin:auto">
    <button class="back-btn" onclick="location.href='../index.html'">← Kembali</button>
    <h2 style="color:#fbbf24"><i class="fas fa-history"></i> Riwayat Order MOD</h2>
    <div id="riwayatList"></div>
    <button class="clear-btn" onclick="localStorage.removeItem('llc_riwayat'); location.reload()">Hapus Semua</button>
</div>
<style>
.back-btn,.clear-btn{background:#f59e0b;border:none;padding:12px;border-radius:40px;width:100%;margin:10px 0;color:#0f172a;font-weight:bold;cursor:pointer}
.riwayat-card{background:#0f172a;border-radius:16px;padding:15px;margin-bottom:12px;border-left:3px solid #f59e0b}
.riwayat-date{font-size:11px;color:#94a3b8}
.riwayat-game{font-weight:bold;color:#fbbf24;margin:5px 0}
.riwayat-detail{font-size:12px;color:#cbd5e1}
.empty-state{text-align:center;padding:40px;color:#64748b}
</style>
<script>
    const riwayat = JSON.parse(localStorage.getItem('llc_riwayat') || '[]');
    const container = document.getElementById('riwayatList');
    if(riwayat.length===0) container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    else container.innerHTML = riwayat.map(t => `
        <div class="riwayat-card">
            <div class="riwayat-date">${t.tanggal}</div>
            <div class="riwayat-game">🎮 ${t.game}</div>
            <div class="riwayat-detail">📦 ${t.paket} | 💰 ${t.harga} | 💳 ${t.metode}</div>
            <div class="riwayat-detail">Status: <span style="color:#f59e0b">${t.status || 'Diproses'}</span></div>
        </div>
    `).join('');
</script>
</body>
</html>
