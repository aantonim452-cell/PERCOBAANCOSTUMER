<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Saya - LLC STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #0a0a1a; padding: 20px; }
        .dashboard-container { max-width: 600px; margin: 0 auto; }
        .back-btn { background: #f59e0b; border: none; padding: 12px 20px; border-radius: 50px; color: #0f172a; font-weight: bold; cursor: pointer; margin-bottom: 20px; width: 100%; }
        .info-card { background: rgba(15,25,45,0.8); border-radius: 1rem; padding: 20px; margin-bottom: 15px; text-align: center; }
        .info-card i { font-size: 40px; color: #f59e0b; margin-bottom: 10px; }
        .info-card h3 { color: #fbbf24; margin-bottom: 5px; }
        .info-card p { color: #94a3b8; font-size: 13px; }
        .version { text-align: center; margin-top: 20px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <button class="back-btn" onclick="window.location.href='../index.html'">
        <i class="fas fa-arrow-left"></i> Kembali ke Beranda
    </button>
    
    <div class="info-card">
        <i class="fas fa-user-circle"></i>
        <h3>ID Member</h3>
        <p id="memberId">Belum login</p>
    </div>
    
    <div class="info-card">
        <i class="fas fa-chart-line"></i>
        <h3>Total Transaksi</h3>
        <p id="totalTransaksi">0</p>
    </div>
    
    <div class="info-card">
        <i class="fas fa-clock"></i>
        <h3>Member Sejak</h3>
        <p id="memberSince">-</p>
    </div>
    
    <div class="version" id="versionInfo"></div>
</div>
<script>
    let riwayat = JSON.parse(localStorage.getItem('llc_riwayat') || '[]');
    document.getElementById('totalTransaksi').innerHTML = riwayat.length;
    
    let memberSince = localStorage.getItem('llc_member_since');
    if (!memberSince) {
        memberSince = new Date().toLocaleDateString('id-ID');
        localStorage.setItem('llc_member_since', memberSince);
    }
    document.getElementById('memberSince').innerHTML = memberSince;
    
    let memberId = localStorage.getItem('llc_member_id');
    if (!memberId) {
        memberId = 'MEMBER_' + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('llc_member_id', memberId);
    }
    document.getElementById('memberId').innerHTML = memberId;
    
    let version = localStorage.getItem('llc_version') || '1.0';
    document.getElementById('versionInfo').innerHTML = `LLC STORE v${version} | © 2026`;
</script>
</body>
</html>
